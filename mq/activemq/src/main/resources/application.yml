server:
  port: 8086
spring:
  profiles:
    include:
      - mongo
      - redis
      - mysql
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
    pool:
      enabled: true
      max-connections: 18
  dubbo:
    application:
      name: activemq-service
      registry: zookeeper://127.0.0.1:2181
      qos-port: 22226
    protocol:
      name: dubbo
      port: 20886

