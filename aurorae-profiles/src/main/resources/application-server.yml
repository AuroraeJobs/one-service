server:
  port: ${SERVER_PORT}
  undertow:
    threads:
      io: 2
      worker: 20
    buffer-size: 512
  thread:
    prefix: local-thread-
    core-pool-size: 4
    maximum-pool-size: 1024
    keep-alive-time: 5

spring:
  application:
    name: ${SERVER_NAME}
  transaction:
    rollback-on-commit-failure: true

logging:
  level:
    org.aurorae: DEBUG
  file:
    name: tmp/logs/${spring.application.name}/starter.log
  logback:
    rollingpolicy:
      max-history: 30
      total-size-cap: 2GB
      clean-history-on-start: true